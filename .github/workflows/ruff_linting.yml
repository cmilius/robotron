name: ruff_linting
on:
  pull_request: # Enables automatic triggering of the workflow on pull requests
  push: # Enables automatic triggering of the workflow on pushes to the main branch
    branches:
      - main
  workflow_dispatch: # Enables manual triggering of the workflow from the GitHub Actions tab
  
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install ruff
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff

    - name: Run ruff linting
      run: |
        python -m ruff check . --select ALL --show-source --exit-zero